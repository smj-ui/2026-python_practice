<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>파이썬 멀티 실습 템플릿</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, "Noto Sans KR", sans-serif;
    background: #111827;
    color: #ffffff;
  }

  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    background: #f8fafc;
    color: #111827;
    border-right: 1px solid #d1d5db;
    padding: 24px 20px;
    overflow-y: auto;
  }

  .sidebar h1 {
    margin: 0 0 18px;
    font-size: 28px;
  }

  .sidebar h2 {
    margin: 0 0 14px;
    font-size: 22px;
  }

  .sidebar h3 {
    margin: 18px 0 8px;
    font-size: 16px;
    color: #374151;
  }

  .sidebar p {
    margin: 0 0 12px;
    line-height: 1.8;
    font-size: 15px;
    white-space: pre-wrap;
  }

  .info-box {
    margin-top: 8px;
    background: #ffffff;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    padding: 12px;
    font-family: Consolas, Monaco, monospace;
    white-space: pre-wrap;
    line-height: 1.7;
    font-size: 14px;
  }

  .tip-box {
    margin-top: 16px;
    background: #eef2ff;
    color: #312e81;
    border-radius: 12px;
    padding: 12px;
    white-space: pre-wrap;
    line-height: 1.7;
    font-size: 14px;
  }

  .mini {
    margin-top: 14px;
    color: #6b7280;
    font-size: 13px;
  }

  .main {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    min-width: 0;
  }

  .topbar {
    padding: 16px 20px;
    background: #1f2937;
    border-bottom: 1px solid #374151;
    font-size: 22px;
    font-weight: 700;
  }

  .tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px;
    background: #111827;
    border-bottom: 1px solid #374151;
  }

  .tab-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    background: #374151;
    color: white;
    font-size: 15px;
    font-weight: 700;
  }

  .tab-btn.active {
    background: #7c3aed;
  }

  .lesson-panel {
    display: none;
  }

  .lesson-panel.active {
    display: block;
  }

  .lesson-header {
    background: #111827;
    border-bottom: 1px solid #374151;
    padding: 16px;
  }

  .lesson-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .lesson-desc {
    color: #cbd5e1;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .editor-wrap {
    background: #111827;
    border-bottom: 1px solid #374151;
  }

  .editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2b3242;
    padding: 12px 16px;
    font-size: 17px;
    font-weight: 700;
  }

  .editor {
    width: 100%;
    min-height: 260px;
    resize: vertical;
    border: none;
    outline: none;
    padding: 18px;
    background: #000000;
    color: #f9fafb;
    font-family: Consolas, Monaco, monospace;
    font-size: 18px;
    line-height: 1.7;
    tab-size: 4;
  }

  .input-wrap {
    padding: 16px;
    background: #0b1220;
    border-top: 1px solid #374151;
  }

  .input-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .input-desc {
    color: #cbd5e1;
    font-size: 14px;
    margin-bottom: 8px;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .input-area {
    width: 100%;
    min-height: 90px;
    resize: vertical;
    border: 1px solid #334155;
    border-radius: 12px;
    background: #020617;
    color: #f9fafb;
    padding: 12px;
    font-family: Consolas, Monaco, monospace;
    font-size: 15px;
    line-height: 1.7;
    outline: none;
  }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    padding: 16px;
    background: #111827;
    border-top: 1px solid #374151;
  }

  button {
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }

  .run-btn { background: #ffffff; color: #111827; }
  .check-btn { background: #7c3aed; color: #ffffff; }
  .reset-btn { background: #4b5563; color: #ffffff; }
  .submit-btn { background: #10b981; color: #ffffff; }

  .result {
    padding: 20px;
    background: #0b1020;
  }

  .result-panel {
    background: #111827;
    border: 1px solid #374151;
    border-radius: 16px;
    overflow: hidden;
  }

  .result-title {
    background: #171e2d;
    border-bottom: 1px solid #374151;
    padding: 14px 18px;
    font-size: 18px;
    font-weight: 700;
  }

  .status {
    padding: 16px 18px 0;
    font-size: 18px;
    font-weight: 700;
  }

  .status.info { color: #93c5fd; }
  .status.pass { color: #34d399; }
  .status.fail { color: #f87171; }

  .output-log {
    padding: 14px 18px 20px;
    white-space: pre-wrap;
    font-family: Consolas, Monaco, monospace;
    font-size: 15px;
    line-height: 1.7;
  }

  .submit-area {
    margin-top: 16px;
    background: #0f172a;
    border-top: 1px solid #374151;
    padding: 16px;
  }

  .submit-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .submit-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(220px, 320px));
    gap: 12px;
    margin-bottom: 12px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .input-row label {
    min-width: 42px;
    font-weight: 700;
  }

  .input-row select {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #111827;
    color: #ffffff;
    outline: none;
  }

  .submit-help {
    color: #cbd5e1;
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 10px;
    white-space: pre-wrap;
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { border-right: 0; border-bottom: 1px solid #d1d5db; }
    .submit-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h1 id="guideTitle"></h1>
    <h2 id="sidebarLessonTitle"></h2>
    <p id="sidebarInstruction"></p>
    <p id="sidebarInstructionSub"></p>

    <div id="sidebarBlankSection">
      <h3 id="sidebarBlankTitle"></h3>
      <div class="info-box" id="sidebarBlankBox"></div>
    </div>

    <div id="sidebarInputExampleSection">
      <h3 id="sidebarInputExampleTitle"></h3>
      <div class="info-box" id="sidebarInputExampleBox"></div>
    </div>

    <div id="sidebarOutputExampleSection">
      <h3 id="sidebarOutputExampleTitle"></h3>
      <div class="info-box" id="sidebarOutputExampleBox"></div>
    </div>

    <div id="sidebarHintSection">
      <h3 id="sidebarHintTitle"></h3>
      <div class="info-box" id="sidebarHintBox"></div>
    </div>

    <div class="tip-box" id="sidebarTipBox"></div>
    <div class="mini">교사용 수정 템플릿 (출력 예시 포함)</div>
  </aside>

  <main class="main">
    <div class="topbar" id="pageTitle"></div>
    <div class="tabs" id="tabsContainer"></div>
    <div id="panelsContainer"></div>

    <section class="result">
      <div class="result-panel">
        <div class="result-title">결과</div>
        <div class="status info" id="globalStatus">아직 실행하지 않았습니다.</div>
        <div class="output-log" id="globalOutput">여기에 실행 결과와 채점 결과가 표시됩니다.</div>
      </div>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>

/************************************************************
 * 아래는 보통 수정하지 않아도 되는 로직
 ************************************************************/
let activeLessonIndex = 0;
let latestCheckResults = [];

function initState() {
  latestCheckResults = CONFIG.lessons.map(() => '미확인');
}

function createSelectOptions(values) {
  return `<option value="">선택</option>` + values.map(v => `<option value="${v}">${v}</option>`).join('');
}

function buildTabs() {
  const container = document.getElementById('tabsContainer');
  container.innerHTML = '';

  CONFIG.lessons.forEach((lesson, index) => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'tab-btn' + (index === 0 ? ' active' : '');
    button.textContent = lesson.tabName;
    button.addEventListener('click', () => switchTab(index));
    container.appendChild(button);
  });
}

function buildPanels() {
  const container = document.getElementById('panelsContainer');
  container.innerHTML = '';

  CONFIG.lessons.forEach((lesson, index) => {
    const panel = document.createElement('section');
    panel.className = 'lesson-panel' + (index === 0 ? ' active' : '');
    panel.id = `panel-${index}`;

    panel.innerHTML = `
      <div class="lesson-header">
        <div class="lesson-title">${lesson.title}</div>
        <div class="lesson-desc">${escapeHtml(lesson.instructionText + '\n' + lesson.instructionSubText)}</div>
      </div>

      <div class="editor-wrap">
        <div class="editor-header">
          <span>main.py</span>
          <span>${lesson.tabName} 코드 입력</span>
        </div>

        <textarea id="code-${index}" class="editor"></textarea>

        <div id="input-wrap-${index}" class="input-wrap ${lesson.useInputBox ? '' : 'hidden'}">
          <div class="input-title">입력 데이터</div>
          <div class="input-desc" id="input-desc-${index}"></div>
          <textarea id="input-${index}" class="input-area"></textarea>
        </div>

        <div class="controls">
          <button class="run-btn" type="button" onclick="runCode(${index})">실행</button>
          <button class="check-btn" type="button" onclick="checkAnswer(${index})">정답 확인</button>
          <button class="reset-btn" type="button" onclick="resetCode(${index})">초기화</button>
        </div>

        <div class="submit-area ${lesson.showSubmit ? '' : 'hidden'}">
          <div class="submit-title">최종 제출하기</div>
          <div class="submit-grid">
            <div class="input-row">
              <label for="classroom-${index}">반</label>
              <select id="classroom-${index}">
                ${createSelectOptions(CONFIG.classOptions)}
              </select>
            </div>

            <div class="input-row">
              <label for="studentNumber-${index}">번호</label>
              <select id="studentNumber-${index}">
                ${createSelectOptions(CONFIG.numberOptions)}
              </select>
            </div>
          </div>

          <div class="submit-help">
최종 과제 탭에서만 제출하세요.
작성 코드는 자동으로 들어가고, 적용 여부는 이 탭의 정답 확인 결과가 저장됩니다.
          </div>
          <button class="submit-btn" type="button" onclick="submitFinalTask(${index})">구글폼 제출</button>
        </div>
      </div>
    `;

    container.appendChild(panel);
  });

  CONFIG.lessons.forEach((lesson, index) => {
    document.getElementById(`code-${index}`).value = lesson.starterCode || '';
    if (lesson.useInputBox) {
      document.getElementById(`input-${index}`).value = lesson.starterInputData || '';
      document.getElementById(`input-desc-${index}`).textContent = lesson.inputDataDescription || '';
    }
  });
}

function escapeHtml(text) {
  return text
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

function updateSidebar(index) {
  const lesson = CONFIG.lessons[index];

  document.getElementById('guideTitle').textContent = CONFIG.guideTitle;
  document.getElementById('pageTitle').textContent = CONFIG.pageTitle;
  document.getElementById('sidebarLessonTitle').textContent = lesson.title;
  document.getElementById('sidebarInstruction').textContent = lesson.instructionText;
  document.getElementById('sidebarInstructionSub').textContent = lesson.instructionSubText;

  const blankSection = document.getElementById('sidebarBlankSection');
  if (lesson.showBlankPrompt) {
    blankSection.classList.remove('hidden');
    document.getElementById('sidebarBlankTitle').textContent = lesson.blankTitle;
    document.getElementById('sidebarBlankBox').textContent = lesson.blankPrompt;
  } else {
    blankSection.classList.add('hidden');
  }

  const inputExampleSection = document.getElementById('sidebarInputExampleSection');
  if (lesson.useInputBox && lesson.showInputExample) {
    inputExampleSection.classList.remove('hidden');
    document.getElementById('sidebarInputExampleTitle').textContent = lesson.inputExampleTitle;
    document.getElementById('sidebarInputExampleBox').textContent = lesson.inputExampleOutput;
  } else {
    inputExampleSection.classList.add('hidden');
  }

  const outputExampleSection = document.getElementById('sidebarOutputExampleSection');
  if (lesson.showOutputExample) {
    outputExampleSection.classList.remove('hidden');
    document.getElementById('sidebarOutputExampleTitle').textContent = lesson.outputExampleTitle;
    document.getElementById('sidebarOutputExampleBox').textContent = lesson.outputExampleOutput;
  } else {
    outputExampleSection.classList.add('hidden');
  }

  const hintSection = document.getElementById('sidebarHintSection');
  if (lesson.showHintBox) {
    hintSection.classList.remove('hidden');
    document.getElementById('sidebarHintTitle').textContent = lesson.hintTitle;
    document.getElementById('sidebarHintBox').textContent = lesson.hintText;
  } else {
    hintSection.classList.add('hidden');
  }

  document.getElementById('sidebarTipBox').textContent = lesson.tipText || '';
}

function switchTab(index) {
  activeLessonIndex = index;

  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  document.querySelectorAll('.lesson-panel').forEach((panel, i) => {
    panel.classList.toggle('active', i === index);
  });

  updateSidebar(index);
  setStatus(`${CONFIG.lessons[index].tabName} 탭으로 이동했습니다.`, 'info');
  setOutput('여기에 실행 결과와 채점 결과가 표시됩니다.');
}

function setStatus(message, type) {
  const status = document.getElementById('globalStatus');
  status.textContent = message;
  status.className = `status ${type}`;
}

function setOutput(text) {
  document.getElementById('globalOutput').textContent = text;
}

function builtinRead(x) {
  if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined) {
    throw "File not found: " + x;
  }
  return Sk.builtinFiles["files"][x];
}

function getInputLines(index) {
  const lesson = CONFIG.lessons[index];
  if (!lesson.useInputBox) return [];
  const raw = document.getElementById(`input-${index}`).value || '';
  return raw.replace(/\r/g, '').split('\n');
}

async function executePython(code, index) {
  let output = '';
  const lesson = CONFIG.lessons[index];
  const inputLines = getInputLines(index);
  let inputIndex = 0;

  Sk.configure({
    output: function(text) {
      output += text;
    },
    read: builtinRead,
    __future__: Sk.python3,
    inputfun: function() {
      if (!lesson.useInputBox) return Promise.resolve('');
      if (inputIndex >= inputLines.length) return Promise.resolve('');
      return Promise.resolve(inputLines[inputIndex++]);
    },
    inputfunTakesPrompt: true
  });

  try {
    await Sk.misceval.asyncToPromise(function() {
      return Sk.importMainWithBody("<stdin>", false, code, true);
    });
    return { success: true, output: output.replace(/\n$/, '') };
  } catch (err) {
    return { success: false, output: String(err) };
  }
}

async function runCode(index) {
  const code = document.getElementById(`code-${index}`).value;
  setStatus(`${CONFIG.lessons[index].tabName} 코드를 실행했습니다.`, 'info');
  setOutput('실행 중...');

  const result = await executePython(code, index);

  if (result.success) {
    setOutput(result.output || '(출력 없음)');
  } else {
    setStatus('실행 중 오류가 발생했습니다.', 'fail');
    setOutput(result.output);
  }
}

async function checkAnswer(index) {
  const code = document.getElementById(`code-${index}`).value;
  const lesson = CONFIG.lessons[index];

  setStatus(`${lesson.tabName} 정답을 확인하는 중입니다...`, 'info');
  setOutput('채점 중...');

  const result = await executePython(code, index);

  if (!result.success) {
    latestCheckResults[index] = '오답';
    setStatus('오답입니다. 먼저 오류를 해결하세요.', 'fail');
    setOutput(`실행 오류\n\n${result.output}`);
    return;
  }

  if (result.output === lesson.expectedOutput) {
    latestCheckResults[index] = '정답';
    setStatus('정답입니다! 출력이 채점 기준과 일치합니다.', 'pass');
    setOutput(`실행 결과\n\n${result.output}\n\n채점 결과\n정답`);
  } else {
    latestCheckResults[index] = '오답';
    const expectedLines = lesson.expectedOutput.split('\n');
    const actualLines = result.output.split('\n');

    let feedback = '실행 결과\n\n' + (result.output || '(출력 없음)') + '\n\n채점 결과\n오답\n\n';
    feedback += '비교 안내\n';

    const maxLen = Math.max(expectedLines.length, actualLines.length);
    for (let i = 0; i < maxLen; i++) {
      const expected = expectedLines[i] ?? '(없음)';
      const actual = actualLines[i] ?? '(없음)';
      if (expected === actual) {
        feedback += `${i + 1}번째 줄: 일치\n`;
      } else {
        feedback += `${i + 1}번째 줄: 다름\n`;
      }
    }

    setStatus('오답입니다. 출력 내용을 다시 확인하세요.', 'fail');
    setOutput(feedback);
  }
}

function resetCode(index) {
  const lesson = CONFIG.lessons[index];
  document.getElementById(`code-${index}`).value = lesson.starterCode || '';
  if (lesson.useInputBox) {
    document.getElementById(`input-${index}`).value = lesson.starterInputData || '';
  }
  latestCheckResults[index] = '미확인';
  setStatus(`${lesson.tabName} 코드를 초기 상태로 되돌렸습니다.`, 'info');
  setOutput('여기에 실행 결과와 채점 결과가 표시됩니다.');
}

/************************************************************
 * 마지막 과제만 제출
 ************************************************************/
function submitFinalTask(index) {
  const classroom = document.getElementById(`classroom-${index}`).value.trim();
  const studentNumber = document.getElementById(`studentNumber-${index}`).value.trim();
  const code = document.getElementById(`code-${index}`).value;
  const result = latestCheckResults[index];

  if (!classroom || !studentNumber) {
    alert('반과 번호를 모두 선택하세요.');
    return;
  }

  if (result === '미확인') {
    alert('먼저 정답 확인을 눌러 채점 결과를 만든 뒤 제출하세요.');
    return;
  }

  const url =
    CONFIG.formBaseUrl +
    '?' + CONFIG.entryClassroom + '=' + encodeURIComponent(classroom) +
    '&' + CONFIG.entryStudentNumber + '=' + encodeURIComponent(studentNumber) +
    '&' + CONFIG.entryCode + '=' + encodeURIComponent(code) +
    '&' + CONFIG.entryResult + '=' + encodeURIComponent(result);

  window.location.href = url;
}

function initPage() {
  initState();
  buildTabs();
  buildPanels();
  updateSidebar(0);
  setStatus('실습 페이지가 준비되었습니다.', 'info');
  setOutput('여기에 실행 결과와 채점 결과가 표시됩니다.');
}

initPage();
</script>
