<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Python 실습</title>

<style>

body{
font-family: Arial;
margin:0;
background:#111827;
color:white;
}

.tabs{
display:flex;
background:#1f2937;
padding:10px;
gap:10px;
}

.tabs button{
padding:10px 16px;
border:none;
background:#374151;
color:white;
cursor:pointer;
border-radius:6px;
}

.tabs button.active{
background:#7c3aed;
}

.panel{
display:none;
padding:20px;
}

.panel.active{
display:block;
}

textarea{
width:100%;
height:200px;
background:black;
color:white;
font-family:monospace;
font-size:16px;
padding:10px;
}

.input-box{
margin-top:10px;
}

button.run{
margin-top:10px;
padding:10px 16px;
}

.result{
margin-top:15px;
white-space:pre-wrap;
background:#020617;
padding:15px;
}

.submit-area{
margin-top:20px;
background:#0f172a;
padding:15px;
}

select{
padding:8px;
margin-right:10px;
}

</style>
</head>

<body>

<div class="tabs" id="tabs"></div>

<div id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

<script>

//////////////////////////////////////////////////////////////
// 여기만 수정하면 됨
//////////////////////////////////////////////////////////////

const CONFIG = {

lessons:[

{
tab:"실습1",
title:"출력 실습",
desc:"Hello 와 Python 을 출력하세요",

useInput:false,

expected:`Hello
Python`,

submit:false
},

{
tab:"실습2",
title:"input 실습",
desc:"이름을 입력받아 '안녕하세요 [이름]' 출력",

useInput:true,

inputData:`민지`,

expected:`안녕하세요 민지`,

submit:false
},

{
tab:"실습3",
title:"조건문",
desc:"숫자를 입력받아 10 이상이면 큰수 출력",

useInput:true,

inputData:`12`,

expected:`큰수`,

submit:false
},

{
tab:"최종과제",
title:"최종 제출",
desc:"이름과 점수를 입력받아 결과 출력",

useInput:true,

inputData:`홍길동
85`,

expected:`홍길동님의 점수는 85점입니다.`,

submit:true
}

],

//////////////////////////////////////////////////////////////
// 구글폼 (차시마다 여기만 변경)
//////////////////////////////////////////////////////////////

formBaseUrl:'https://docs.google.com/forms/d/e/1FAIpQLSdylJ-XFRgBLSF8SvM7Hn_6w-NpzJhDnhSBu0vPdOqBhkymIw/formResponse',

entryClass:'entry.1342927365',
entryNumber:'entry.194717561',
entryCode:'entry.668448153',
entryResult:'entry.1180100706'

}

//////////////////////////////////////////////////////////////

let results=[]

function init(){

buildTabs()
buildPanels()

}

//////////////////////////////////////////////////////////////

function buildTabs(){

const tabs=document.getElementById("tabs")

CONFIG.lessons.forEach((l,i)=>{

const b=document.createElement("button")

b.textContent=l.tab

if(i==0)b.classList.add("active")

b.onclick=()=>switchTab(i)

tabs.appendChild(b)

})

}

//////////////////////////////////////////////////////////////

function buildPanels(){

const content=document.getElementById("content")

CONFIG.lessons.forEach((l,i)=>{

const div=document.createElement("div")

div.className="panel"
if(i==0)div.classList.add("active")

div.innerHTML=`

<h2>${l.title}</h2>

<p>${l.desc}</p>

<textarea id="code${i}"></textarea>

${l.useInput?`
<div class="input-box">
입력 데이터<br>
<textarea id="input${i}">${l.inputData||""}</textarea>
</div>
`:""}

<br>
<button class="run" onclick="runCode(${i})">실행</button>
<button class="run" onclick="checkAnswer(${i})">정답확인</button>

<div class="result" id="result${i}"></div>

${l.submit?`

<div class="submit-area">

반
<select id="class${i}">
${Array.from({length:10},(_,k)=>`<option>${k+1}</option>`).join("")}
</select>

번호
<select id="num${i}">
${Array.from({length:27},(_,k)=>`<option>${k+1}</option>`).join("")}
</select>

<br><br>

<button onclick="submit(${i})">구글폼 제출</button>

</div>

`:""}

`

content.appendChild(div)

})

}

//////////////////////////////////////////////////////////////

function switchTab(i){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tabs button").forEach(p=>p.classList.remove("active"))

document.querySelectorAll(".panel")[i].classList.add("active")
document.querySelectorAll(".tabs button")[i].classList.add("active")

}

//////////////////////////////////////////////////////////////

function builtinRead(x){
if(Sk.builtinFiles===undefined||Sk.builtinFiles["files"][x]===undefined)
throw "File not found:"+x
return Sk.builtinFiles["files"][x]
}

//////////////////////////////////////////////////////////////

async function runPython(code,input){

let output=""

let inputLines=input.split("\n")
let index=0

Sk.configure({

output:(text)=>output+=text,

read:builtinRead,

inputfun:()=>Promise.resolve(inputLines[index++]||"")

})

try{

await Sk.misceval.asyncToPromise(()=>{
return Sk.importMainWithBody("<stdin>",false,code,true)
})

return output.trim()

}catch(e){

return e.toString()

}

}

//////////////////////////////////////////////////////////////

async function runCode(i){

const code=document.getElementById("code"+i).value
const input=document.getElementById("input"+i)?.value||""

const out=await runPython(code,input)

document.getElementById("result"+i).textContent=out

}

//////////////////////////////////////////////////////////////

async function checkAnswer(i){

const code=document.getElementById("code"+i).value
const input=document.getElementById("input"+i)?.value||""

const out=await runPython(code,input)

const ok=out==CONFIG.lessons[i].expected

results[i]=ok?"정답":"오답"

document.getElementById("result"+i).textContent=
out+"\n\n채점결과 : "+results[i]

}

//////////////////////////////////////////////////////////////

function submit(i){

const classroom=document.getElementById("class"+i).value
const number=document.getElementById("num"+i).value

const code=document.getElementById("code"+i).value

const result=results[i]

const url=

CONFIG.formBaseUrl+
"?"+CONFIG.entryClass+"="+classroom+
"&"+CONFIG.entryNumber+"="+number+
"&"+CONFIG.entryCode+"="+encodeURIComponent(code)+
"&"+CONFIG.entryResult+"="+result

window.location.href=url

}

//////////////////////////////////////////////////////////////

init()

</script>

</body>
</html>
