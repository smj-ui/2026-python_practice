<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파이썬 출력 실습 템플릿</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Pretendard","Noto Sans KR",Arial,sans-serif; background: #0f1117; color: #e5e7eb; }
    .app { display: grid; grid-template-columns: 360px 1fr; min-height: 100vh; }
    .sidebar { background: #f7f7f8; color: #1f2937; border-right: 1px solid #d1d5db; padding: 24px 20px; overflow-y: auto; }
    .sidebar h1 { font-size: 28px; margin: 0 0 20px; }
    .sidebar h2 { font-size: 22px; margin: 0 0 16px; }
    .sidebar h3 { font-size: 16px; margin: 22px 0 10px; color: #374151; }
    .sidebar p { line-height: 1.8; margin: 0 0 14px; font-size: 16px; }

    .box {
      margin-top: 10px;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      font-family: Consolas, Monaco, monospace;
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 14px;
    }

    .hint {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #eef2ff;
      color: #312e81;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .mini { color: #6b7280; font-size: 14px; margin-top: 14px; }

    .main { display: grid; grid-template-rows: auto auto 1fr; min-width: 0; }

    .topbar {
      padding: 16px 20px;
      border-bottom: 1px solid #2c3445;
      background: #1a1f2b;
      font-weight: 700;
      font-size: 22px;
    }

    .editor-wrap {
      padding: 0;
      background: #111827;
      border-bottom: 1px solid #2c3445;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #2b3242;
      font-size: 18px;
      font-weight: 700;
    }

    .editor {
      width: 100%;
      min-height: 320px;
      resize: vertical;
      border: 0;
      outline: none;
      padding: 18px;
      background: #000;
      color: #f9fafb;
      font-size: 19px;
      line-height: 1.7;
      font-family: Consolas, Monaco, monospace;
      tab-size: 4;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px;
      background: #111827;
      border-top: 1px solid #2c3445;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .run-btn { background: #ffffff; color: #111827; }
    .check-btn { background: #7c3aed; color: white; }
    .submit-btn { background: #10b981; color: white; }
    .reset-btn { background: #374151; color: white; }

    .submit-area {
      border-top: 1px solid #2c3445;
      padding: 18px 16px 20px;
      background: #0f172a;
    }

    .submit-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .submit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 320px));
      gap: 12px;
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .input-row label {
      min-width: 42px;
      font-size: 16px;
      font-weight: 700;
      color: #f9fafb;
    }

    .input-row input {
      flex: 1;
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #111827;
      color: #f9fafb;
      font-size: 16px;
      outline: none;
    }

    .submit-help {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .result {
      background: #0b1020;
      padding: 20px;
      overflow: auto;
    }

    .panel {
      border: 1px solid #2c3445;
      border-radius: 16px;
      overflow: hidden;
      background: #111827;
    }

    .panel-title {
      padding: 14px 18px;
      background: #171e2d;
      border-bottom: 1px solid #2c3445;
      font-size: 18px;
      font-weight: 700;
    }

    .status {
      padding: 16px 18px 0;
      font-size: 18px;
      font-weight: 700;
    }

    .status.pass { color: #34d399; }
    .status.fail { color: #f87171; }
    .status.info { color: #93c5fd; }

    .log {
      white-space: pre-wrap;
      padding: 14px 18px 20px;
      font-family: Consolas, Monaco, monospace;
      font-size: 16px;
      line-height: 1.7;
      color: #e5e7eb;
    }

    .hidden { display: none; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid #d1d5db; }
      .submit-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 id="guideTitle"></h1>
      <h2 id="problemTitle"></h2>
      <p id="instructionText"></p>
      <p id="instructionSubText"></p>

      <div id="blankSection">
        <h3 id="blankTitle"></h3>
        <div class="box" id="blankPrompt"></div>
      </div>

      <div id="exampleSection">
        <h3 id="exampleTitle"></h3>
        <div class="box" id="exampleOutput"></div>
      </div>

      <div class="hint" id="hintText"></div>
      <div class="mini">교사용 수정 템플릿</div>
    </aside>

    <main class="main">
      <div class="topbar" id="pageTitle"></div>

      <section class="editor-wrap">
        <div class="editor-header">
          <span>main.py</span>
          <span>Python 코드 입력</span>
        </div>
        <textarea id="code" class="editor"></textarea>
        <div class="controls">
          <button class="run-btn" onclick="runCode()">실행</button>
          <button class="check-btn" onclick="checkAnswer()">정답 확인</button>
          <button class="reset-btn" onclick="resetCode()">초기화</button>
        </div>

        <div class="submit-area">
          <div class="submit-title">제출하기</div>
          <div class="submit-grid">
            <div class="input-row">
              <label for="classroom">반</label>
              <input type="text" id="classroom" />
            </div>
            <div class="input-row">
              <label for="studentNumber">번호</label>
              <input type="text" id="studentNumber" />
            </div>
          </div>
          <div class="submit-help">
            반과 번호를 입력한 뒤 제출하세요. 작성 코드는 자동으로 들어가고, 적용 여부는 정답 확인 결과에 따라 자동으로 저장됩니다.
          </div>
          <button class="submit-btn" onclick="submitToGoogleForm()">구글폼 제출</button>
        </div>
      </section>

      <section class="result">
        <div class="panel">
          <div class="panel-title">결과</div>
          <div id="status" class="status info">아직 실행하지 않았습니다.</div>
          <div id="output" class="log">여기에 실행 결과와 채점 결과가 표시됩니다.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
  <script>
    /************************************************************
     * 여기만 수정하면 됩니다
     ************************************************************/
    const CONFIG = {
      guideTitle: "지침",
      problemTitle: "출력 실습",
      pageTitle: "Python 출력 실습",

      instructionText: "아래 안내를 참고하여 레시피를 출력하는 파이썬 프로그램을 작성하세요. 총 5줄을 출력해야 하며, 각 줄은 완전한 영어 문장이어야 합니다.",
      instructionSubText: "각 줄에는 번호가 붙어야 하고, 재료의 양과 시간, 온도 같은 숫자 정보도 정확해야 합니다. 빈칸 문제와 힌트를 보고 직접 완성해 보세요.",

      showBlankPrompt: true,
      blankTitle: "작성해야 할 문제",
      blankPrompt: `1번째 줄: print("1. ________________________________")
2번째 줄: print("2. ________________________________")
3번째 줄: print("3. ________________________________")
4번째 줄: print("4. ________________________________")
5번째 줄: print("5. ________________________________")`,

      showExampleBox: true,
      exampleTitle: "참고 힌트",
      exampleOutput: `1번째 줄: 밀가루 500g, 이스트 10g, 물 300ml를 bowl에 넣는 문장
2번째 줄: 반죽을 10분 동안 치대는 문장
3번째 줄: 소금 3g을 추가하는 문장
4번째 줄: 2시간 동안 발효시키는 문장
5번째 줄: 200도에서 30분 굽는 문장`,

      hintText: "팁: print()를 5번 사용해서 각 줄을 직접 완성해 보세요.",

      starterCode: ``,

      expectedOutput: `1. Mix 500g of Flour, 10g Yeast and 300ml Water in a bowl.
2. Knead the dough for 10 minutes.
3. Add 3g of Salt.
4. Leave to rise for 2 hours.
5. Bake at 200 degrees C for 30 minutes.`,

      formUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSdylJ-XFRgBLSF8SvM7Hn_6w-NpzJhDnhSBu0vPdOqBhkymIw/formResponse',
      entryClassroom: 'entry.1342927365',
      entryStudentNumber: 'entry.194717561',
      entryCode: 'entry.668448153',
      entryResult: 'entry.1180100706'
    };

    let latestCheckResult = '미확인';

    function applyConfig() {
      document.getElementById('guideTitle').textContent = CONFIG.guideTitle;
      document.getElementById('problemTitle').textContent = CONFIG.problemTitle;
      document.getElementById('pageTitle').textContent = CONFIG.pageTitle;
      document.getElementById('instructionText').textContent = CONFIG.instructionText;
      document.getElementById('instructionSubText').textContent = CONFIG.instructionSubText;
      document.getElementById('hintText').textContent = CONFIG.hintText;
      document.getElementById('code').value = CONFIG.starterCode;

      const blankSection = document.getElementById('blankSection');
      if (CONFIG.showBlankPrompt) {
        blankSection.classList.remove('hidden');
        document.getElementById('blankTitle').textContent = CONFIG.blankTitle;
        document.getElementById('blankPrompt').textContent = CONFIG.blankPrompt;
      } else {
        blankSection.classList.add('hidden');
      }

      const exampleSection = document.getElementById('exampleSection');
      if (CONFIG.showExampleBox) {
        exampleSection.classList.remove('hidden');
        document.getElementById('exampleTitle').textContent = CONFIG.exampleTitle;
        document.getElementById('exampleOutput').textContent = CONFIG.exampleOutput;
      } else {
        exampleSection.classList.add('hidden');
      }
    }

    function setStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${type}`;
    }

    function setOutput(text) {
      document.getElementById('output').textContent = text;
    }

    function builtinRead(x) {
      if (Sk.builtinFiles === undefined || Sk.builtinFiles['files'][x] === undefined) {
        throw `File not found: '${x}'`;
      }
      return Sk.builtinFiles['files'][x];
    }

    async function executePython(code) {
      let output = '';
      Sk.pre = 'output';
      Sk.configure({
        output: function(text) { output += text; },
        read: builtinRead,
        __future__: Sk.python3
      });

      try {
        await Sk.misceval.asyncToPromise(function() {
          return Sk.importMainWithBody('<stdin>', false, code, true);
        });
        return { success: true, output: output.replace(/\n$/, '') };
      } catch (err) {
        return { success: false, output: String(err) };
      }
    }

    async function runCode() {
      const code = document.getElementById('code').value;
      setStatus('코드를 실행했습니다.', 'info');
      setOutput('실행 중...');
      const result = await executePython(code);
      if (result.success) {
        setOutput(result.output || '(출력 없음)');
      } else {
        setStatus('실행 중 오류가 발생했습니다.', 'fail');
        setOutput(result.output);
      }
    }

    async function checkAnswer() {
      const code = document.getElementById('code').value;
      setStatus('정답을 확인하는 중입니다...', 'info');
      setOutput('채점 중...');

      const result = await executePython(code);

      if (!result.success) {
        latestCheckResult = '오답';
        setStatus('오답입니다. 먼저 오류를 해결하세요.', 'fail');
        setOutput(`실행 오류\n\n${result.output}`);
        return;
      }

      if (result.output === CONFIG.expectedOutput) {
        latestCheckResult = '정답';
        setStatus('정답입니다! 출력이 채점 기준과 일치합니다.', 'pass');
        setOutput(`실행 결과\n\n${result.output}\n\n채점 결과\n정답`);
      } else {
        latestCheckResult = '오답';
        const expectedLines = CONFIG.expectedOutput.split('\n');
        const actualLines = result.output.split('\n');
        let feedback = '실행 결과\n\n' + (result.output || '(출력 없음)') + '\n\n채점 결과\n오답\n\n';
        feedback += '비교 안내\n';
        const maxLen = Math.max(expectedLines.length, actualLines.length);
        for (let i = 0; i < maxLen; i++) {
          const expected = expectedLines[i] ?? '(없음)';
          const actual = actualLines[i] ?? '(없음)';
          if (expected === actual) {
            feedback += `${i + 1}번째 줄: 일치\n`;
          } else {
            feedback += `${i + 1}번째 줄: 다름\n`;
          }
        }
        setStatus('오답입니다. 출력 내용을 다시 확인하세요.', 'fail');
        setOutput(feedback);
      }
    }

    function resetCode() {
      document.getElementById('code').value = CONFIG.starterCode;
      latestCheckResult = '미확인';
      setStatus('코드를 초기 상태로 되돌렸습니다.', 'info');
      setOutput('여기에 실행 결과와 채점 결과가 표시됩니다.');
    }

    async function submitToGoogleForm() {
      const classroom = document.getElementById('classroom').value.trim();
      const studentNumber = document.getElementById('studentNumber').value.trim();
      const code = document.getElementById('code').value;

      if (!classroom || !studentNumber) {
        alert('반과 번호를 모두 입력하세요.');
        return;
      }

      if (latestCheckResult === '미확인') {
        alert('먼저 정답 확인을 눌러 채점 결과를 만든 뒤 제출하세요.');
        return;
      }

      const params = new URLSearchParams();
      params.append(CONFIG.entryClassroom, classroom);
      params.append(CONFIG.entryStudentNumber, studentNumber);
      params.append(CONFIG.entryCode, code);
      params.append(CONFIG.entryResult, latestCheckResult);

      try {
        await fetch(CONFIG.formUrl, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: params.toString()
        });

        alert(`제출되었습니다.\n반: ${classroom}\n번호: ${studentNumber}\n적용 여부: ${latestCheckResult}`);
      } catch (e) {
        alert('제출 중 문제가 발생했습니다.');
      }
    }

    applyConfig();
  </script>
</body>
</html>
