<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>파이썬 실습 – 함수와 클래스</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1e1e2e;--surface:#181825;--surface2:#313244;--border:#45475a;
  --accent:#89b4fa;--green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af;
  --purple:#cba6f7;--cyan:#89dceb;--orange:#fab387;
  --text:#cdd6f4;--subtext:#a6adc8;--muted:#6c7086;
  --sidebar:#11111b;--codebg:#11111b;
  --kw:#cba6f7;--fn-c:#89b4fa;--str-c:#a6e3a1;--num-c:#fab387;
  --cm-c:#6c7086;--op-c:#89dceb;--cls-c:#f9e2af;--self-c:#f38ba8;--bi-c:#89dceb;
  --pass-c:#a6e3a1;--fail-c:#f38ba8;--info-c:#89b4fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Gmarket Sans','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.app{display:grid;grid-template-columns:370px 1fr;min-height:100vh}

/* ── Sidebar ── */
.sidebar{background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#1a1a2e 0%,#11111b 100%)}
.sb-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(137,180,250,.12);border:1px solid rgba(137,180,250,.3);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.08em;margin-bottom:8px}
.sb-title{font-size:19px;font-weight:700;line-height:1.3}
.sb-credit{font-size:11px;color:var(--muted);margin-top:3px}
.sb-body{flex:1;overflow-y:auto;padding:16px 18px}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.lm-title{font-size:15px;font-weight:700;margin-bottom:8px;line-height:1.4}
.lm-desc{font-size:13px;color:var(--subtext);line-height:1.75;margin-bottom:4px}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin:14px 0 6px}
.hl-block{background:#11111b;border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.9;overflow-x:auto;white-space:pre}
.prob-block{background:#11111b;border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;padding:12px 14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.9;color:var(--subtext);white-space:pre-wrap}
/* ── 구조화된 문제 카드 ── */
.prob-cards{display:flex;flex-direction:column;gap:7px}
.prob-section-title{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--orange);text-transform:uppercase;margin:10px 0 5px;padding-left:2px}
.prob-card{background:#11111b;border:1px solid var(--border);border-radius:9px;overflow:hidden}
.prob-card-item{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border-bottom:1px solid #2a2a3a;font-size:12.5px;line-height:1.7;color:var(--subtext)}
.prob-card-item:last-child{border-bottom:none}
.prob-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:rgba(166,227,161,.15);color:var(--green);border:1px solid rgba(166,227,161,.3);margin-top:1px}
.prob-text{flex:1;word-break:keep-all;white-space:normal}
.prob-text code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:rgba(137,180,250,.12);color:var(--accent);border-radius:4px;padding:1px 5px;white-space:nowrap}
.out-block{background:#0a1628;border:1px solid #1c3a5e;border-left:3px solid var(--green);border-radius:8px;padding:11px 14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.9;color:var(--green);white-space:pre-wrap}
.hint-block{background:#1a1a2e;border:1px solid #2d3a5a;border-left:3px solid var(--purple);border-radius:8px;padding:11px 14px;font-size:12.5px;line-height:1.75;color:#c9b3ff;white-space:pre-wrap}
.tip-block{background:rgba(249,226,175,.07);border:1px solid rgba(249,226,175,.22);border-radius:8px;padding:11px 14px;font-size:12px;line-height:1.7;color:var(--yellow);margin-top:12px}
.tip-block::before{content:"💡 "}
/* syntax tokens */
.kw{color:var(--kw);font-weight:700}.fn{color:var(--fn-c)}.str{color:var(--str-c)}
.num{color:var(--num-c)}.cm{color:var(--cm-c);font-style:italic}.op{color:var(--op-c)}
.cls-n{color:var(--cls-c);font-weight:700}.self-k{color:var(--self-c)}.bi{color:var(--bi-c)}

/* ── Main ── */
.main{display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.topbar-title{font-size:15px;font-weight:700}
.submit-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.submit-wrap label{font-size:12.5px;color:var(--subtext)}
.submit-wrap select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:12.5px;outline:none;font-family:inherit}

.tabs-area{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;flex-direction:column;gap:0}
.tabs-grid{display:grid;grid-template-columns:28px repeat(7,auto) 1fr;align-items:center;gap:0 7px;padding:4px 0}
.trow-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.tab-placeholder{width:68px;height:30px;border-radius:20px;background:transparent;border:1px dashed #2a2a3a;cursor:default;flex-shrink:0}
.tab-btn{border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--muted);transition:all .2s;font-family:inherit}
.tab-btn:hover{color:var(--text);border-color:var(--subtext)}
.tab-btn.active.ex{background:rgba(137,180,250,.15);color:var(--accent);border-color:var(--accent)}
.tab-btn.active.pr{background:rgba(166,227,161,.15);color:var(--green);border-color:var(--green)}
.tab-btn.active.task{background:rgba(243,139,168,.15);color:var(--red);border-color:var(--red)}

.panels{flex:1;overflow:auto}
.lesson-panel{display:none;flex-direction:column}
.lesson-panel.active{display:flex}

/* ── Custom Code Editor ── */
.editor-topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.editor-filename{color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:12px}
.editor-tag{color:var(--muted);font-size:11.5px}

.ce-container{display:flex;background:var(--codebg);border-bottom:1px solid var(--border)}
.ce-gutter{
  background:#181825;border-right:1px solid var(--border);
  color:var(--muted);font-family:'JetBrains Mono',monospace;
  font-size:13px;line-height:1.8;padding:14px 8px 14px 6px;
  text-align:right;user-select:none;min-width:40px;
  white-space:pre;overflow:hidden;flex-shrink:0;
}
.ce-inner{
  flex:1;position:relative;overflow:auto;
}
.ce-inner::-webkit-scrollbar{height:5px;width:5px}
.ce-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ce-hl{
  position:relative;padding:14px 16px;
  font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.8;
  white-space:pre;pointer-events:none;color:var(--text);
  word-break:normal;
}
.ce-ta{
  position:absolute;top:0;left:0;width:100%;height:100%;
  padding:14px 16px;
  background:transparent;color:transparent;caret-color:var(--text);
  border:none;outline:none;resize:none;
  font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.8;
  tab-size:4;white-space:pre;overflow:hidden;z-index:2;
}

.controls{display:flex;flex-wrap:wrap;gap:8px;padding:11px 15px;background:var(--surface);border-top:1px solid var(--border)}
.btn{border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-run{background:#1a4a28;color:var(--green);border:1px solid #2a6b3a}
.btn-check{background:rgba(137,180,250,.15);color:var(--accent);border:1px solid rgba(137,180,250,.4)}
.btn-reset{background:var(--surface2);color:var(--subtext);border:1px solid var(--border)}
.btn-submit{background:var(--red);color:#fff}
.btn-copy{background:var(--surface2);color:var(--subtext);border:1px solid var(--border);font-size:12px;padding:7px 13px}

.result-panel{margin:11px 15px 13px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)}
.result-head{padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12.5px;font-weight:700;color:var(--muted)}
.result-status{padding:10px 15px 0;font-size:13.5px;font-weight:700}
.result-status.pass{color:var(--pass-c)}.result-status.fail{color:var(--fail-c)}.result-status.info{color:var(--info-c)}
.result-log{padding:9px 15px 15px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.75;color:#cdd6f4;white-space:pre-wrap}

.hidden{display:none!important}
@media(max-width:800px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border);max-height:320px}}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar">
  <div class="sb-head">
    <div class="sb-badge">🐍 Python</div>

    <div class="lm-desc"   id="sbDesc"></div>

      <div class="sec-label" id="sbCodeLabel"></div>
      <div id="sbCodeBox"></div>
    </div>

      <div class="sec-label" id="sbOutLabel"></div>

</aside>

<!-- ═══════ MAIN ═══════ -->
<main class="main">

    <div class="topbar-title" id="pageTitle"></div>

      <span style="font-size:13px;font-weight:700">최종 제출하기</span>

      <button class="btn btn-submit" id="topSubmitBtn">구글폼 제출</button>

  </div>
  <div class="tabs-area">
    <!-- 예시 행: 라벨 + 개념1~7 슬롯 -->

    <div class="tabs-grid" id="prTabsRow">
      <span class="trow-label">실습</span>
    </div>
  </div>
  <div class="panels" id="panelsContainer"></div>
</main>
</div>

<!-- ═══════ Skulpt ═══════ -->
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
<script>
/* stdlib가 로드되지 않았을 때 builtinFiles를 빈 객체로 초기화해서
   "No module named sys" 류의 크래시를 원천 차단한다. */
(function ensureBuiltinFiles(){
  function patch(){
    if(typeof Sk !== 'undefined'){
      if(!Sk.builtinFiles) Sk.builtinFiles = { files:{} };
      if(!Sk.builtinFiles.files) Sk.builtinFiles.files = {};
    }
  }
  // 현재 시점에서 패치
  patch();
  // DOMContentLoaded 이후에도 한 번 더 (로드 타이밍 차이 대비)
  document.addEventListener('DOMContentLoaded', patch);
})();
</script>

/* ════════════════════════════════════
   PROBLEM CARD RENDERER
════════════════════════════════════ */
function renderProblem(text){
  /* text 안의 \n 을 실제 줄로 나눈다 */
  const lines = text.split('\n');
  let html = '<div class="prob-cards">';
  let inCard = false;
  const CIRCLE = '①②③④⑤⑥⑦⑧⑨⑩';

  function e(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  /* 큰따옴표 문자열, 함수호출(), 변수명 = 패턴을 code 태그로 */
  function hl(s){
    return e(s)
      /* "문자열" */
      .replace(/&quot;([^&]*)&quot;/g, (_,m)=>`<code>"${m}"</code>`)
      /* 식별자( 패턴 – 함수 호출 */
      .replace(/\b([a-zA-Z_][a-zA-Z0-9_.]*)\(/g, (_,m)=>`<code>${m}(</code>`)
      /* 숫자 */
      .replace(/\b(\d+)\b/g, (_,m)=>`<span style="color:var(--num-c)">${m}</span>`);
  }

  let i = 0;
  while(i < lines.length){
    const raw  = lines[i];
    const trim = raw.trim();
    i++;

    if(!trim) continue;

    /* [섹션 제목] */
    const secM = trim.match(/^\[(.+?)\]/);
    if(secM){
      if(inCard){ html += '</div>'; inCard = false; }
      html += `<div class="prob-section-title">${e(secM[1])}</div><div class="prob-card">`;
      inCard = true;
      continue;
    }

    /* ①②… 또는 숫자) 항목 – 이어지는 들여쓰기 줄도 같은 셀에 합침 */
    const itemM = trim.match(/^([①②③④⑤⑥⑦⑧⑨⑩]|[0-9]+[).])\s*(.*)/);
    if(itemM){
      if(!inCard){ html += '<div class="prob-card">'; inCard = true; }
      let numDisp = itemM[1].replace(/[).]$/,'');
      let body = hl(itemM[2]);
      /* 다음 줄이 들여쓰기 이어지는 줄이면 합침 */
      while(i < lines.length && /^\s{2,}/.test(lines[i]) && lines[i].trim()){
        body += '<br>' + hl(lines[i].trim());
        i++;
      }
      html += `<div class="prob-card-item">` +
              `<span class="prob-num">${e(numDisp)}</span>` +
              `<span class="prob-text">${body}</span></div>`;
      continue;
    }

    /* - 로 시작하는 서브 항목 */
    if(trim.startsWith('-')){
      if(!inCard){ html += '<div class="prob-card">'; inCard = true; }
      html += `<div class="prob-card-item" style="padding-left:45px;padding-top:5px;padding-bottom:5px">` +
              `<span class="prob-text" style="color:var(--muted);font-size:12px">${hl(trim.slice(1).trim())}</span></div>`;
      continue;
    }

    /* 일반 텍스트 줄 */
    if(!inCard){ html += '<div class="prob-card">'; inCard = true; }
    html += `<div class="prob-card-item"><span class="prob-text">${hl(trim)}</span></div>`;
  }

  if(inCard) html += '</div>';
  html += '</div>';
  return html;
}

/* ════════════════════════════════════
   SYNTAX HIGHLIGHTER
════════════════════════════════════ */
const KW = new Set(['def','class','return','if','else','elif','for','while','in',
  'not','and','or','is','pass','import','from','as','try','except','finally',
  'with','lambda','yield','True','False','None','break','continue','global',
  'nonlocal','raise','del','assert']);
const BI = new Set(['print','len','range','int','str','float','list','dict','tuple',
  'set','bool','type','input','abs','max','min','sum','sorted','reversed',
  'enumerate','zip','map','filter','open','super','isinstance','hasattr',
  'getattr','setattr','repr','format','round','hex','oct','bin','chr','ord']);

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function hlPython(code){
  return code.split('\n').map(hlLine).join('\n');
}

function hlLine(line){
  let r='', i=0, n=line.length;
  while(i<n){
    // comment
    if(line[i]==='#'){ r+=`<span class="cm">${esc(line.slice(i))}</span>`; break; }
    // triple-quoted string
    if((line[i]==='"'||line[i]==="'") && line.slice(i,i+3)===line[i].repeat(3)){
      const q=line[i].repeat(3); let k=i+3;
      while(k<n && line.slice(k,k+3)!==q) k++;
      k = k<n ? k+3 : n;
      r+=`<span class="str">${esc(line.slice(i,k))}</span>`; i=k; continue;
    }
    // f-string
    if((line[i]==='f'||line[i]==='F') && i+1<n && (line[i+1]==='"'||line[i+1]==="'")){
      const q=line[i+1]; let j=i+2;
      while(j<n && line[j]!==q){ if(line[j]==='\\') j++; j++; }
      j=j<n?j+1:n;
      r+=`<span class="str">${esc(line.slice(i,j))}</span>`; i=j; continue;
    }
    // regular string
    if(line[i]==='"'||line[i]==="'"){
      const q=line[i]; let j=i+1;
      while(j<n && line[j]!==q){ if(line[j]==='\\') j++; j++; }
      j=j<n?j+1:n;
      r+=`<span class="str">${esc(line.slice(i,j))}</span>`; i=j; continue;
    }
    // number
    if(/[0-9]/.test(line[i])||(line[i]==='.'&&i+1<n&&/[0-9]/.test(line[i+1]))){
      let j=i; while(j<n&&/[0-9._eExXbBoO]/.test(line[j]))j++;
      r+=`<span class="num">${esc(line.slice(i,j))}</span>`; i=j; continue;
    }
    // identifier / keyword
    if(/[a-zA-Z_]/.test(line[i])){
      let j=i; while(j<n&&/[a-zA-Z0-9_]/.test(line[j]))j++;
      const w=line.slice(i,j);
      const plain=r.replace(/<[^>]+>/g,'');
      const after=line.slice(j).trimStart();
      if(w==='self')                           r+=`<span class="self-k">${esc(w)}</span>`;
      else if(KW.has(w))                       r+=`<span class="kw">${esc(w)}</span>`;
      else if(BI.has(w))                       r+=`<span class="bi">${esc(w)}</span>`;
      else if(/\bclass\s*$/.test(plain))       r+=`<span class="cls-n">${esc(w)}</span>`;
      else if(/\bdef\s*$/.test(plain))         r+=`<span class="fn">${esc(w)}</span>`;
      else if(after.startsWith('('))           r+=`<span class="fn">${esc(w)}</span>`;
      else                                     r+=esc(w);
      i=j; continue;
    }
    // operator / punctuation
    if(/[+\-*/%=<>!&|^~@:,.()\[\]{}]/.test(line[i])){
      r+=`<span class="op">${esc(line[i])}</span>`; i++; continue;
    }
    r+=esc(line[i]); i++;
  }
  return r;
}

/* ════════════════════════════════════
   CUSTOM EDITOR
════════════════════════════════════ */
function makeEditor(lesson, idx){
  // gutter
  const gutter = document.createElement('div');
  gutter.className = 'ce-gutter';
  gutter.id = `gutter-${idx}`;

  // highlight layer
  const hl = document.createElement('div');
  hl.className = 'ce-hl';
  hl.id = `hl-${idx}`;

  // textarea
  const ta = document.createElement('textarea');
  ta.id = `code-${idx}`;
  ta.className = 'ce-ta';
  ta.value = lesson.starter || '';
  ta.spellcheck = false;
  ta.autocomplete = 'off';
  ta.autocorrect  = 'off';
  ta.autocapitalize = 'off';

  // inner scroller
  const inner = document.createElement('div');
  inner.className = 'ce-inner';
  inner.appendChild(hl);
  inner.appendChild(ta);

  // container
  const wrap = document.createElement('div');
  wrap.className = 'ce-container';
  wrap.appendChild(gutter);
  wrap.appendChild(inner);

  /* ── sync ── */
  function sync(){
    const code = ta.value;
    hl.innerHTML = hlPython(code) + '\n';
    const lines = code.split('\n').length;
    let g = '';
    for(let i=1;i<=lines;i++) g += i + '\n';
    gutter.textContent = g;
    // stretch textarea to content
    ta.style.height = '1px';
    const h = Math.max(260, ta.scrollHeight);
    ta.style.height = h + 'px';
    hl.style.minHeight = h + 'px';
    inner.style.minHeight = h + 'px';
    wrap.style.minHeight = h + 'px';
  }
  sync();

  ta.addEventListener('input', sync);
  ta.addEventListener('scroll', () => {
    hl.style.transform = `translateY(-${ta.scrollTop}px) translateX(-${ta.scrollLeft}px)`;
    gutter.style.transform = `translateY(-${ta.scrollTop}px)`;
  });

  /* ── keyboard ── */
  ta.addEventListener('keydown', e => {
    const val   = ta.value;
    const start = ta.selectionStart;
    const end   = ta.selectionEnd;

    /* TAB / SHIFT+TAB */
    if(e.key === 'Tab'){
      e.preventDefault();

      if(start !== end){
        /* ── block indent / unindent ── */
        const lineStart = val.lastIndexOf('\n', start-1) + 1;
        const lastNL    = val.indexOf('\n', end-1);
        const lineEnd   = lastNL === -1 ? val.length : lastNL;
        const block     = val.slice(lineStart, lineEnd);
        const lines     = block.split('\n');

        let newLines;
        if(e.shiftKey){
          newLines = lines.map(l => l.replace(/^    /, ''));
        } else {
          newLines = lines.map(l => '    ' + l);
        }
        const newBlock = newLines.join('\n');
        ta.value = val.slice(0, lineStart) + newBlock + val.slice(lineEnd);

        // restore selection across the whole block
        const firstDelta = newLines[0].length - lines[0].length;
        const totalDelta = newLines.reduce((s,l,i) => s + (l.length - lines[i].length), 0);
        ta.selectionStart = Math.max(lineStart, start + firstDelta);
        ta.selectionEnd   = end + totalDelta;
        sync(); return;
      }

      /* single cursor – insert 4 spaces */
      ta.value = val.slice(0, start) + '    ' + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 4;
      sync(); return;
    }

    /* ENTER – auto-indent */
    if(e.key === 'Enter'){
      e.preventDefault();
      const lineStart  = val.lastIndexOf('\n', start-1) + 1;
      const curLine    = val.slice(lineStart, start);
      const m          = curLine.match(/^(\s*)/);
      let indent       = m ? m[1] : '';
      if(curLine.trimEnd().endsWith(':')) indent += '    ';
      ta.value = val.slice(0, start) + '\n' + indent + val.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 1 + indent.length;
      sync(); return;
    }

    /* BACKSPACE – smart de-indent (4 spaces at once) */
    if(e.key === 'Backspace' && start === end && start > 0){
      const lineStart = val.lastIndexOf('\n', start-1) + 1;
      const col = start - lineStart;
      if(col > 0 && col % 4 === 0 && val.slice(start-4, start) === '    '){
        e.preventDefault();
        ta.value = val.slice(0, start-4) + val.slice(start);
        ta.selectionStart = ta.selectionEnd = start - 4;
        sync(); return;
      }
    }
  });

  return { wrap, ta, sync };
}

/* Skulpt가 내부적으로 요청하는 파일들을 안전하게 처리.
   stdlib가 로드되지 않았을 때도 print 등 기본 기능은 동작하도록
   빈 모듈 스텁을 반환한다. */
function skulptRead(x){
  // 1) stdlib가 정상 로드된 경우 → 그대로 반환
  if(typeof Sk !== 'undefined' && Sk.builtinFiles && Sk.builtinFiles.files && Sk.builtinFiles.files[x] !== undefined){
    return Sk.builtinFiles.files[x];
  }
  // 2) 지원하지 않는 모듈 → 사용자 친화적 오류
  const unsupported = ['sys','os','io','_io','time','datetime','json','re',
                       'collections','itertools','functools','pathlib',
                       'subprocess','threading','socket','http','urllib',
                       'csv','pickle','struct','ctypes','multiprocessing'];
  const modName = x.replace(/^.*\//, '').replace(/\.js$/, '');
  if(unsupported.includes(modName)){
    throw `이 환경에서는 '${modName}' 모듈을 사용할 수 없습니다.\n(print, input 등 기본 기능은 모두 사용 가능합니다.)`;
  }
  // 3) 그 외 내부 파일 → 빈 스텁 반환 (크래시 방지)
  return '';
}

/* 코드 실행 전 import sys / import os 등을 감지해 미리 안내 */
function preCheck(code){
  const lines = code.split('\n');
  const unsupported = ['sys','os','io','time','datetime','json','re',
                       'collections','itertools','functools','pathlib',
                       'subprocess','threading','socket','http','urllib'];
  for(let i=0; i<lines.length; i++){
    const m = lines[i].match(/^\s*import\s+(\w+)/);
    if(m && unsupported.includes(m[1])){
      return `이 환경에서는 '${m[1]}' 모듈을 사용할 수 없습니다. (${i+1}번 줄)\nprint, input 등 기본 기능은 모두 사용 가능합니다.`;
    }
    const m2 = lines[i].match(/^\s*from\s+(\w+)\s+import/);
    if(m2 && unsupported.includes(m2[1])){
      return `이 환경에서는 '${m2[1]}' 모듈을 사용할 수 없습니다. (${i+1}번 줄)`;
    }
  }
  return null;
}

async function runPython(code){
  if(typeof Sk === 'undefined')
    return { ok:false, out:'', err:'Skulpt 라이브러리를 불러오지 못했습니다. 새로고침 후 다시 시도하세요.' };

  const preErr = preCheck(code);
  if(preErr) return { ok:false, out:'', err: preErr };

  let out = '';
  Sk.configure({
    output     : t => { out += t; },
    read       : skulptRead,
    __future__ : Sk.python3,
    execLimit  : 5000   // 5초 타임아웃 → 무한루프 방지
  });
  try {
    await Sk.misceval.asyncToPromise(() =>
      Sk.importMainWithBody('<stdin>', false, code, true)
    );
    return { ok:true, out: out.replace(/\n$/, ''), err:'' };
  } catch(e) {
    const msg = String(e);
    let friendly = msg;
    if(msg.toLowerCase().includes('exec') && msg.toLowerCase().includes('limit'))
      friendly = '⏱ 실행 시간 초과 – 무한 루프가 있는지 확인하세요.';
    else if(msg.includes('No module named'))
      friendly = msg.replace('ImportError:','') + '\n이 환경(브라우저)에서 지원되지 않는 모듈입니다.';
    return { ok:false, out: out.replace(/\n$/, ''), err: friendly };
  }
}

/* ════════════════════════════════════
   STATE
════════════════════════════════════ */
let activeIdx = 0;
const checkResults = CONFIG.lessons.map(() => '미확인');
const editors = [];

/* ════════════════════════════════════
   BUILD UI
════════════════════════════════════ */
function init(){
  document.getElementById('sbTitle').textContent   = CONFIG.guideTitle;
  document.getElementById('pageTitle').textContent = CONFIG.pageTitle;

  const sc = document.getElementById('selClass');
  const sn = document.getElementById('selNum');
  sc.innerHTML = '<option value="">반</option>' + CONFIG.classOptions.map(v=>`<option>${v}</option>`).join('');
  sn.innerHTML = '<option value="">번호</option>' + CONFIG.numberOptions.map(v=>`<option>${v}</option>`).join('');
  document.getElementById('topSubmitBtn').addEventListener('click', submitForm);

  buildTabs();
  buildPanels();
  switchTab(0);
}

function buildTabs(){
  const er = document.getElementById('exTabsRow');
  const pr = document.getElementById('prTabsRow');

  /* 개념 번호 1~7 각 슬롯에 버튼 또는 빈 자리 배치
     탭 이름에서 숫자를 뽑아 열 위치를 결정한다 */
  const SLOTS = [1,2,3,4,6,7]; // 개념 번호 열 (5번 없음)

  // 예시/실습 별로 탭 이름 → 개념 번호 매핑
  function conceptNum(tabName){
    const m = tabName.match(/\d+/);
    return m ? parseInt(m[0]) : null;
  }

  // lesson 인덱스를 개념번호로 빠르게 찾기
  const exMap = {}, prMap = {};
  CONFIG.lessons.forEach((l, i) => {
    const n = conceptNum(l.tabName);
    if(n === null) return; // 오늘의과제 등 번호 없는 탭은 별도 처리
    if(l.row === 'ex') exMap[n] = i;
    else if(l.row === 'pr') prMap[n] = i;
  });

  // 각 행에 슬롯 채우기
  SLOTS.forEach(n => {
    // 예시 행
    if(exMap[n] !== undefined){
      const i = exMap[n];
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'tab-btn ex';
      b.textContent = CONFIG.lessons[i].tabName;
      b.dataset.i = i;
      b.addEventListener('click', () => switchTab(i));
      er.appendChild(b);
    } else {
      // 빈 placeholder
      const ph = document.createElement('div');
      ph.className = 'tab-placeholder';
      er.appendChild(ph);
    }

    // 실습 행
    if(prMap[n] !== undefined){
      const i = prMap[n];
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'tab-btn pr';
      b.textContent = CONFIG.lessons[i].tabName;
      b.dataset.i = i;
      b.addEventListener('click', () => switchTab(i));
      pr.appendChild(b);
    } else {
      const ph = document.createElement('div');
      ph.className = 'tab-placeholder';
      pr.appendChild(ph);
    }
  });

  // 오늘의과제 버튼은 실습 행 끝에 추가
  CONFIG.lessons.forEach((l, i) => {
    if(l.row === 'task'){
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'tab-btn task';
      b.textContent = l.tabName;
      b.dataset.i = i;
      b.addEventListener('click', () => switchTab(i));
      pr.appendChild(b);
    }
  });
}

function buildPanels(){
  const cont = document.getElementById('panelsContainer');
  CONFIG.lessons.forEach((l, i) => {
    const { wrap:edWrap, ta, sync } = makeEditor(l, i);
    editors[i] = { ta, sync };

    const etop = document.createElement('div');
    etop.className = 'editor-topbar';
    etop.innerHTML = `<span class="editor-filename">main.py</span><span class="editor-tag">${l.tabName}</span>`;

    const ctrl = document.createElement('div');
    ctrl.className = 'controls';
    ctrl.innerHTML =
      `<button class="btn btn-run"   data-act="run"   data-i="${i}">▶ 실행</button>` +
      `<button class="btn btn-check" data-act="check" data-i="${i}">✓ 정답 확인</button>` +
      `<button class="btn btn-reset" data-act="reset" data-i="${i}">↺ 초기화</button>`
    ctrl.addEventListener('click', e => {
      const btn = e.target.closest('button'); if(!btn) return;
      const ii = parseInt(btn.dataset.i), act = btn.dataset.act;
      if(act==='run')    runCode(ii);
      else if(act==='check') checkAnswer(ii);
      else if(act==='reset') resetCode(ii);
      else if(act==='submit') submitForm();
    });

    const res = document.createElement('div');
    res.className = 'result-panel';
    res.innerHTML = `<div class="result-head">결과</div>
      <div id="status-${i}" class="result-status info">아직 실행하지 않았습니다.</div>
      <div id="output-${i}" class="result-log">여기에 실행 결과와 채점 결과가 표시됩니다.</div>`;

    const edSec = document.createElement('div');
    edSec.appendChild(etop);
    edSec.appendChild(edWrap);
    edSec.appendChild(ctrl);

    const panel = document.createElement('section');
    panel.className = 'lesson-panel';
    panel.id = `panel-${i}`;
    panel.appendChild(edSec);
    panel.appendChild(res);
    cont.appendChild(panel);
  });
}

/* ════════════════════════════════════
   SIDEBAR UPDATE
════════════════════════════════════ */
function updateSidebar(i){
  const l = CONFIG.lessons[i];
  document.getElementById('sbLessonTitle').textContent = l.title;
  document.getElementById('sbDesc').textContent    = l.desc;
  document.getElementById('sbDescSub').textContent = l.descSub || '';

  const csec = document.getElementById('sbCodeSec');
  if(l.codeText){
    csec.classList.remove('hidden');
    document.getElementById('sbCodeLabel').textContent = l.codeLabel || '';
    const box = document.getElementById('sbCodeBox');
    if(l.codeType === 'python'){
      box.className = 'hl-block';
      box.innerHTML  = hlPython(l.codeText);
    } else {
      box.className = '';
      box.innerHTML = renderProblem(l.codeText);
    }
  } else csec.classList.add('hidden');

  const osec = document.getElementById('sbOutSec');
  if(l.outText){
    osec.classList.remove('hidden');
    document.getElementById('sbOutLabel').textContent = l.outLabel || '';
    document.getElementById('sbOutBox').textContent   = l.outText;
  } else osec.classList.add('hidden');

  const hsec = document.getElementById('sbHintSec');
  if(l.hintText){
    hsec.classList.remove('hidden');
    document.getElementById('sbHintLabel').textContent = l.hintLabel || '';
    document.getElementById('sbHintBox').textContent   = l.hintText;
  } else hsec.classList.add('hidden');

  document.getElementById('sbTip').textContent = l.tip || '';
  document.getElementById('submitWrap').classList.toggle('hidden', !l.showSubmit);
}

/* ════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════ */
function switchTab(i){
  activeIdx = i;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.i) === i));
  document.querySelectorAll('.lesson-panel').forEach((p, j) =>
    p.classList.toggle('active', j === i));
  updateSidebar(i);
  setStatus(i, `${CONFIG.lessons[i].tabName} 탭으로 이동했습니다.`, 'info');
  setOut(i, '여기에 실행 결과와 채점 결과가 표시됩니다.');
}

function setStatus(i, msg, cls){
  const el = document.getElementById(`status-${i}`);
  if(el){ el.textContent = msg; el.className = `result-status ${cls}`; }
}
function setOut(i, txt){
  const el = document.getElementById(`output-${i}`);
  if(el) el.textContent = txt;
}

/* ════════════════════════════════════
   RUN / CHECK / RESET
════════════════════════════════════ */
async function runCode(i){
  setStatus(i,'실행 중...','info'); setOut(i,'...');
  const r = await runPython(editors[i].ta.value);
  if(r.ok){
    setStatus(i,'✅ 실행 완료','info');
    setOut(i, r.out || '(출력 없음)');
  } else {
    setStatus(i,'❌ 오류 발생','fail');
    setOut(i, (r.out ? r.out+'\n\n' : '') + '오류:\n' + r.err);
  }
}

function norm(s){ return (s||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim(); }

async function checkAnswer(i){
  setStatus(i,'채점 중...','info'); setOut(i,'...');
  const r = await runPython(editors[i].ta.value);
  const l = CONFIG.lessons[i];
  if(!r.ok){
    checkResults[i] = '오답';
    setStatus(i,'❌ 오답 – 먼저 오류를 해결하세요.','fail');
    setOut(i, `실행 결과\n\n${r.out||'(없음)'}\n\n오류\n${r.err}`);
    return;
  }
  const actual = norm(r.out), expected = norm(l.expected);
  if(actual === expected){
    checkResults[i] = '정답';
    setStatus(i,'🎉 정답! 출력이 기준과 일치합니다.','pass');
    setOut(i, `실행 결과\n\n${r.out}\n\n✅ 정답`);
  } else {
    checkResults[i] = '오답';
    const eL = expected.split('\n'), aL = actual.split('\n');
    let fb = `실행 결과\n\n${r.out||'(없음)'}\n\n❌ 오답\n\n줄별 비교\n`;
    const mx = Math.max(eL.length, aL.length);
    for(let k=0; k<mx; k++){
      const e = eL[k]??'(없음)', a = aL[k]??'(없음)';
      fb += e===a ? `${k+1}번 줄 ✓ 일치\n` : `${k+1}번 줄 ✗ 다름\n  정답: ${e}\n  작성: ${a}\n`;
    }
    setStatus(i,'❌ 오답 – 출력 내용을 다시 확인하세요.','fail');
    setOut(i, fb);
  }
}

function resetCode(i){
  editors[i].ta.value = CONFIG.lessons[i].starter || '';
  editors[i].sync();
  checkResults[i] = '미확인';
  setStatus(i,'↺ 초기 상태로 되돌렸습니다.','info');
  setOut(i,'여기에 실행 결과와 채점 결과가 표시됩니다.');
}

/* ════════════════════════════════════
   FORM SUBMIT  (원본 hidden-iframe 방식)
════════════════════════════════════ */
function submitForm(){
  const cls    = document.getElementById('selClass').value;
  const num    = document.getElementById('selNum').value;
  const code   = editors[activeIdx]?.ta.value || '';
  const result = checkResults[activeIdx];
  if(!cls||!num){ alert('반과 번호를 모두 선택하세요.'); return; }
  if(result==='미확인'){ alert('먼저 정답 확인을 눌러 채점 결과를 만든 뒤 제출하세요.'); return; }
  const params = new URLSearchParams();
  params.append(CONFIG.entryClassroom,      cls);
  params.append(CONFIG.entryStudentNumber,  num);
  params.append(CONFIG.entryCode,           code);
  params.append(CONFIG.entryResult,         result);
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  document.body.appendChild(iframe);
  iframe.src = CONFIG.formBaseUrl + '?' + params.toString();
  alert('제출되었습니다!');
}

window.addEventListener('DOMContentLoaded', init);
