<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파이썬 실습</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Pretendard","Noto Sans KR",Arial,sans-serif; background: #0f1117; color: #e5e7eb; }
    .app { display: grid; grid-template-columns: 380px 1fr; min-height: 100vh; }
    .sidebar { background: #f7f7f8; color: #1f2937; border-right: 1px solid #d1d5db; padding: 24px 20px; overflow-y: auto; }
    .sidebar h1 { font-size: 28px; margin: 0 0 20px; }
    .sidebar h2 { font-size: 22px; margin: 0 0 16px; }
    .sidebar h3 { font-size: 16px; margin: 22px 0 10px; color: #374151; }
    .sidebar p { line-height: 1.8; margin: 0 0 14px; font-size: 16px; white-space: pre-wrap; }
    .box { margin-top: 10px; background: white; border: 1px solid #d1d5db; border-radius: 12px; padding: 14px; font-family: Consolas, Monaco, monospace; white-space: pre-wrap; line-height: 1.8; font-size: 14px; }
    .hint { margin-top: 18px; padding: 14px; border-radius: 12px; background: #eef2ff; color: #312e81; font-size: 15px; line-height: 1.7; white-space: pre-wrap; }
    .mini { color: #6b7280; font-size: 14px; margin-top: 14px; }
    .main { display: grid; grid-template-rows: auto auto 1fr; min-width: 0; }
    .header-area { background: #1a1f2b; border-bottom: 1px solid #2c3445; padding: 0 20px 12px 20px; }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; min-height: 64px; }
    .topbar { padding: 16px 0; font-weight: 700; font-size: 22px; flex: 1; }
    .top-submit-area { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .top-submit-title { font-size: 14px; font-weight: 700; color: #f9fafb; margin-right: 4px; white-space: nowrap; }
    .top-submit-row { display: flex; align-items: center; gap: 6px; }
    .top-submit-row label { font-size: 14px; font-weight: 700; color: #e5e7eb; white-space: nowrap; }
    .top-submit-row select { padding: 10px 12px; border-radius: 10px; border: 1px solid #334155; background: #111827; color: #f9fafb; font-size: 14px; outline: none; min-width: 88px; }
    .top-submit-help { color: #cbd5e1; font-size: 13px; line-height: 1.6; white-space: pre-wrap; margin-top: 4px; }
    .tabs-wrap { display: flex; flex-direction: column; gap: 8px; padding: 14px 16px; background: #111827; border-bottom: 1px solid #2c3445; }
    .tabs-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .tab-btn { border: 0; border-radius: 12px; padding: 10px 16px; font-size: 15px; font-weight: 700; cursor: pointer; background: #374151; color: white; }
    .tab-btn.active { background: #7c3aed; }
    .lesson-panel { display: none; }
    .lesson-panel.active { display: block; }
    .editor-wrap { background: #111827; border-bottom: 1px solid #2c3445; }
    .editor-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #2b3242; font-size: 18px; font-weight: 700; }
    .editor { width: 100%; min-height: 320px; resize: vertical; border: 0; outline: none; padding: 18px; background: #000; color: #f9fafb; font-size: 19px; line-height: 1.7; font-family: Consolas, Monaco, monospace; tab-size: 4; }
    .controls { display: flex; flex-wrap: wrap; gap: 12px; padding: 16px; background: #111827; border-top: 1px solid #2c3445; }
    button { border: 0; border-radius: 12px; padding: 12px 18px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .run-btn { background: #ffffff; color: #111827; }
    .check-btn { background: #7c3aed; color: white; }
    .reset-btn { background: #374151; color: white; }
    .submit-btn { background: #10b981; color: white; }
    .panel { border: 1px solid #2c3445; border-radius: 16px; overflow: hidden; background: #111827; margin: 0 16px 16px 16px; }
    .panel-title { padding: 14px 18px; background: #171e2d; border-bottom: 1px solid #2c3445; font-size: 18px; font-weight: 700; }
    .status { padding: 16px 18px 0; font-size: 18px; font-weight: 700; }
    .status.pass { color: #34d399; }
    .status.fail { color: #f87171; }
    .status.info { color: #93c5fd; }
    .log { white-space: pre-wrap; padding: 14px 18px 20px; font-family: Consolas, Monaco, monospace; font-size: 16px; line-height: 1.7; color: #e5e7eb; }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid #d1d5db; }
      .header-row { flex-direction: column; align-items: flex-start; }
      .top-submit-area { justify-content: flex-start; }
    }
  </style>
</head>

    function buildTabs() {
      const exampleContainer = document.getElementById('exampleTabsContainer');
      const practiceContainer = document.getElementById('practiceTabsContainer');
      exampleContainer.innerHTML = '';
      practiceContainer.innerHTML = '';
      CONFIG.lessons.forEach((lesson, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tab-btn' + (index === 0 ? ' active' : '');

        btn.textContent = lesson.tabName;
        btn.addEventListener('click', () => switchTab(index));
        (lesson.row === 'example' ? exampleContainer : practiceContainer).appendChild(btn);
      });
    }

            <div class="controls">
              <button class="run-btn" type="button" id="run-${index}">실행</button>
              <button class="check-btn" type="button" id="check-${index}">정답 확인</button>
              <button class="reset-btn" type="button" id="reset-${index}">초기화</button>
            </div>
            <div class="panel">
              <div class="panel-title">결과</div>
              <div id="status-${index}" class="status info">아직 실행하지 않았습니다.</div>
              <div id="output-${index}" class="log">여기에 실행 결과와 채점 결과가 표시됩니다.</div>
            </div>
          </div>`;
        container.appendChild(panel);
      });

      CONFIG.lessons.forEach((lesson, index) => {
        document.getElementById(`code-${index}`).value = lesson.starterCode || '';
        document.getElementById(`run-${index}`).addEventListener('click', () => runCode(index));
        document.getElementById(`check-${index}`).addEventListener('click', () => checkAnswer(index));
        document.getElementById(`reset-${index}`).addEventListener('click', () => resetCode(index));
      });
    }

    function enableEditorTabIndent() {
      document.querySelectorAll('.editor').forEach((editor) => {
        editor.addEventListener('keydown', function(event) {
          if (event.key === 'Tab') {
            event.preventDefault();
            const start = this.selectionStart;
            const end = this.selectionEnd;
            const indent = '    ';
            const value = this.value;
            this.value = value.substring(0, start) + indent + value.substring(end);
            this.selectionStart = this.selectionEnd = start + indent.length;
          }
        });
      });
    }

    function updateSidebar(index) {
      const lesson = CONFIG.lessons[index];
      document.getElementById('guideTitle').textContent = CONFIG.guideTitle;
      document.getElementById('pageTitle').textContent = CONFIG.pageTitle;
      document.getElementById('sidebarLessonTitle').textContent = lesson.title;
      document.getElementById('sidebarInstruction').textContent = lesson.instructionText;
      document.getElementById('sidebarInstructionSub').textContent = lesson.instructionSubText;

      const blankSection = document.getElementById('sidebarBlankSection');
      if (lesson.showBlankPrompt) {
        blankSection.classList.remove('hidden');
        document.getElementById('sidebarBlankTitle').textContent = lesson.blankTitle;
        document.getElementById('sidebarBlankBox').textContent = lesson.blankPrompt;
      } else blankSection.classList.add('hidden');

      const outputExampleSection = document.getElementById('sidebarOutputExampleSection');
      if (lesson.showOutputExample) {
        outputExampleSection.classList.remove('hidden');
        document.getElementById('sidebarOutputExampleTitle').textContent = lesson.outputExampleTitle;
        document.getElementById('sidebarOutputExampleBox').textContent = lesson.outputExampleOutput;
      } else outputExampleSection.classList.add('hidden');

      const hintSection = document.getElementById('sidebarHintSection');
      if (lesson.showHintBox) {
        hintSection.classList.remove('hidden');
        document.getElementById('sidebarHintTitle').textContent = lesson.hintTitle;
        document.getElementById('sidebarHintBox').textContent = lesson.hintText;
      } else hintSection.classList.add('hidden');

      document.getElementById('sidebarTipBox').textContent = lesson.tipText || '';
      document.getElementById('topSubmitArea').classList.toggle('hidden', !lesson.showSubmit);
      document.getElementById('topSubmitHelp').classList.toggle('hidden', !lesson.showSubmit);
    }

    function switchTab(index) {
      activeLessonIndex = index;
      document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.remove('active'));
      const targetBtn = document.querySelector(`.tab-btn[data-index="${index}"]`);
      if (targetBtn) targetBtn.classList.add('active');
      document.querySelectorAll('.lesson-panel').forEach((panel, i) => panel.classList.toggle('active', i === index));
      updateSidebar(index);
      setStatus(index, `${CONFIG.lessons[index].tabName} 창으로 이동했습니다.`, 'info');
      setOutput(index, '여기에 실행 결과와 채점 결과가 표시됩니다.');
    }

    function setStatus(index, message, type) {
      const el = document.getElementById(`status-${index}`);
      el.textContent = message;
      el.className = `status ${type}`;
    }

    function setOutput(index, text) {
      document.getElementById(`output-${index}`).textContent = text;
    }

    function builtinRead(x) {
      if (Sk.builtinFiles === undefined || Sk.builtinFiles['files'][x] === undefined) throw "File not found: " + x;
      return Sk.builtinFiles['files'][x];
    }

    async function executePython(code) {
      let stdout = '';
      let errorText = '';
      Sk.configure({
        output: function(text) { stdout += text; },
        read: builtinRead,
        __future__: Sk.python3
      });
      try {
        await Sk.misceval.asyncToPromise(function() {
          return Sk.importMainWithBody('<stdin>', false, code, true);
        });
        return { success: true, stdout: stdout.replace(/\n$/, ''), error: '' };
      } catch (err) {
        errorText = String(err);
        return { success: false, stdout: stdout.replace(/\n$/, ''), error: errorText };
      }
    }

    function normalizeOutput(text) {
      return (text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
    }

    async function runCode(index) {
      const code = document.getElementById(`code-${index}`).value;
      setStatus(index, `${CONFIG.lessons[index].tabName} 코드를 실행했습니다.`, 'info');
      setOutput(index, '실행 중...');
      const result = await executePython(code);
      if (result.success) {
        setOutput(index, result.stdout || '(출력 없음)');
      } else {
        const combined = (result.stdout ? result.stdout + '\n\n' : '') + result.error;
        setStatus(index, '실행 중 오류가 발생했습니다.', 'fail');
        setOutput(index, combined);
      }
    }

    async function checkAnswer(index) {
      const code = document.getElementById(`code-${index}`).value;
      const lesson = CONFIG.lessons[index];
      setStatus(index, `${lesson.tabName} 정답을 확인하는 중입니다...`, 'info');
      setOutput(index, '채점 중...');
      const result = await executePython(code);

      if (lesson.expectError) {
        const stdout = normalizeOutput(result.stdout);
        const expected = normalizeOutput(lesson.expectedOutput);
        const errorText = String(result.error || '').toLowerCase();
        const errorNeedle = String(lesson.errorContains || '').toLowerCase();

        if (!result.success && stdout === expected && (!errorNeedle || errorText.includes(errorNeedle))) {
          latestCheckResults[index] = '정답';
          setStatus(index, '정답입니다! 의도한 오류가 정상적으로 발생했습니다.', 'pass');
          setOutput(index, `실행 결과\n\n${result.stdout}\n\n오류 내용\n${result.error}\n\n채점 결과\n정답`);
        } else if (result.success) {
          latestCheckResults[index] = '오답';
          setStatus(index, '오답입니다. 이 실습은 마지막에 오류가 나야 합니다.', 'fail');
          setOutput(index, `실행 결과\n\n${result.stdout || '(출력 없음)'}\n\n채점 결과\n오답\n\n튜플 수정 코드까지 작성해 보세요.`);
        } else {
          latestCheckResults[index] = '오답';
          setStatus(index, '오답입니다. 출력 또는 오류 종류를 다시 확인하세요.', 'fail');
          setOutput(index, `실행 결과\n\n${result.stdout || '(출력 없음)'}\n\n오류 내용\n${result.error}\n\n채점 결과\n오답`);
        }
        return;
      }

      if (!result.success) {
        latestCheckResults[index] = '오답';
        setStatus(index, '오답입니다. 먼저 오류를 해결하세요.', 'fail');
        setOutput(index, `실행 결과\n\n${result.stdout || '(출력 없음)'}\n\n오류 내용\n${result.error}`);
        return;
      }

      const actual = normalizeOutput(result.stdout);
      const expected = normalizeOutput(lesson.expectedOutput);

      if (actual === expected) {
        latestCheckResults[index] = '정답';
        setStatus(index, '정답입니다! 출력이 채점 기준과 일치합니다.', 'pass');
        setOutput(index, `실행 결과\n\n${result.stdout}\n\n채점 결과\n정답`);
      } else {
        latestCheckResults[index] = '오답';
        const expectedLines = expected.split('\n');
        const actualLines = actual.split('\n');
        let feedback = '실행 결과\n\n' + (result.stdout || '(출력 없음)') + '\n\n채점 결과\n오답\n\n비교 안내\n';
        const maxLen = Math.max(expectedLines.length, actualLines.length);
        for (let i = 0; i < maxLen; i++) {
          const e = expectedLines[i] ?? '(없음)';
          const a = actualLines[i] ?? '(없음)';
          if (e === a) feedback += `${i + 1}번째 줄: 일치\n`;
          else feedback += `${i + 1}번째 줄: 다름\n- 정답: ${e}\n- 작성: ${a}\n`;
        }
        setStatus(index, '오답입니다. 출력 내용을 다시 확인하세요.', 'fail');
        setOutput(index, feedback);
      }
    }

    function resetCode(index) {
      document.getElementById(`code-${index}`).value = CONFIG.lessons[index].starterCode || '';
      latestCheckResults[index] = '미확인';
      setStatus(index, `${CONFIG.lessons[index].tabName} 코드를 초기 상태로 되돌렸습니다.`, 'info');
      setOutput(index, '여기에 실행 결과와 채점 결과가 표시됩니다.');
    }

    function submitFinalTask(index) {
      const classroom = document.getElementById('topClassroom').value.trim();
      const studentNumber = document.getElementById('topStudentNumber').value.trim();
      const code = document.getElementById(`code-${index}`).value;
      const result = latestCheckResults[index];

      if (!classroom || !studentNumber) {
        alert('반과 번호를 모두 선택하세요.');
        return;
      }
      if (result === '미확인') {
        alert('먼저 정답 확인을 눌러 채점 결과를 만든 뒤 제출하세요.');
        return;
      }

      const params = new URLSearchParams();
      params.append(CONFIG.entryClassroom, classroom);
      params.append(CONFIG.entryStudentNumber, studentNumber);
      params.append(CONFIG.entryCode, code);
      params.append(CONFIG.entryResult, result);

      const hiddenFrame = document.createElement('iframe');
      hiddenFrame.style.display = 'none';
      document.body.appendChild(hiddenFrame);
      hiddenFrame.src = CONFIG.formBaseUrl + '?' + params.toString();
      alert('제출되었습니다.');
    }

    function initPage() {
      initState();
      buildTabs();
      buildPanels();
      enableEditorTabIndent();
      document.getElementById('topClassroom').innerHTML = createSelectOptions(CONFIG.classOptions);
      document.getElementById('topStudentNumber').innerHTML = createSelectOptions(CONFIG.numberOptions);
      document.getElementById('topSubmitBtn').addEventListener('click', () => submitFinalTask(activeLessonIndex));
      updateSidebar(0);
      setStatus(0, '실습 페이지가 준비되었습니다.', 'info');
      setOutput(0, '여기에 실행 결과와 채점 결과가 표시됩니다.');
    }

    window.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
